<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Shape Inserter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Basic Shape Inserter</h1>
            <p>Insert Text, Rectangles, or Ellipses into Inkscape</p>
        </header>

        <main>
            <form id="extension-form">

                <div class="form-group row-group">
                    <div class="form-group flex-1">
                        <label for="shape_type">Shape Type:</label>
                        <select id="shape_type" name="shape_type">
                            <option value="text">Custom Text</option>
                            <option value="rect">Rectangle</option>
                            <option value="ellipse">Ellipse</option>
                        </select>
                    </div>
                </div>

                <div id="text-inputs" class="form-section">
                    <div class="form-group">
                        <label for="text_content">Text Content:</label>
                        <input type="text" id="text_content" name="text_content" placeholder="Enter text here...">
                    </div>
                    <div class="form-group row-group">
                        <div class="form-group flex-1">
                            <label for="font_size">Font Size (px):</label>
                            <input type="number" id="font_size" name="font_size" value="24" min="1">
                        </div>
                    </div>
                </div>

                <div id="dimension-inputs" class="form-section hidden">
                    <div class="form-group row-group">
                        <div class="form-group flex-1">
                            <label for="width">Width (px):</label>
                            <input type="number" id="width" name="width" value="100" min="1">
                        </div>
                        <div class="form-group flex-1">
                            <label for="height">Height (px):</label>
                            <input type="number" id="height" name="height" value="100" min="1">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group row-group align-center">
                        <div class="form-group flex-1">
                            <label for="fill_color">Fill Color:</label>
                            <input type="color" id="fill_color" name="fill_color" value="#bb86fc">
                        </div>
                        <div class="form-group flex-1">
                            <label for="stroke_color">Stroke Color:</label>
                            <input type="color" id="stroke_color" name="stroke_color" value="#ffffff">
                        </div>
                    </div>

                    <div class="form-group row-group mt-15">
                        <div class="form-group flex-1">
                            <label for="stroke_width">Stroke Width (px):</label>
                            <input type="number" id="stroke_width" name="stroke_width" value="2" min="0" step="0.5">
                        </div>
                    </div>
                </div>

                <div class="form-buttons mt-25">
                    <button type="submit" class="btn-primary" id="btn-submit">Insert into Inkscape</button>
                    <button type="button" class="btn-secondary" id="btn-cancel">Close</button>
                </div>
            </form>

            <div id="status-container" class="hidden">
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                </div>
                <div id="status-message" class="status-message">Ready</div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
